name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image (local check)
        run: docker build -t cicd-app .

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu   # IMPORTANT: fix this
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo docker stop cicd-app || true
            sudo docker rm cicd-app || true
            sudo docker build -t cicd-app .
            sudo docker run -d -p 80:3000 --name cicd-app cicd-app